<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Frame Catcher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      width: 310px;
      background: #111112;
      color: #f1f1f1;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #c80000 0%, #ff0000 60%, #ff3232 100%);
      padding: 16px 18px 13px;
      display: flex; align-items: center; gap: 11px;
      position: relative; overflow: hidden;
    }
    .header::before {
      content:''; position:absolute; inset:0;
      background: radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.1) 0%, transparent 60%);
    }
    .header-icon {
      width:34px; height:34px; flex-shrink:0;
      background:rgba(255,255,255,0.14);
      border:1px solid rgba(255,255,255,0.2);
      border-radius:9px; display:flex; align-items:center; justify-content:center;
      backdrop-filter:blur(8px);
    }
    .header-icon svg { width:18px; height:18px; fill:white; }
    .header-text h1 { font-size:13px; font-weight:700; color:white; letter-spacing:0.01em; }
    .header-text p  { font-size:10px; color:rgba(255,255,255,0.65); margin-top:1px; }

    /* ── Tab Bar ── */
    .tab-bar {
      display:flex; background:#0a0a0b;
      border-bottom:1px solid #1e1e20;
    }
    .tab {
      flex:1; padding:10px 0; text-align:center;
      font-size:11.5px; font-weight:500; color:#666;
      cursor:pointer; border-bottom:2px solid transparent;
      transition:color 0.2s, border-color 0.2s;
      letter-spacing:0.02em;
    }
    .tab:hover { color:#aaa; }
    .tab.active { color:#ff4040; border-bottom-color:#ff0000; }

    /* ── Tab Content ── */
    .panel { display:none; padding:16px 18px; flex-direction:column; gap:14px; }
    .panel.active { display:flex; }

    /* ── Section label ── */
    .s-label {
      font-size:10px; font-weight:600; letter-spacing:0.08em;
      text-transform:uppercase; color:#555; margin-bottom:7px;
    }

    /* ── Format Cards ── */
    .format-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; }
    .format-card { position:relative; cursor:pointer; }
    .format-card input[type="radio"] { position:absolute; opacity:0; pointer-events:none; }
    .format-card label {
      display:flex; flex-direction:column; align-items:center; gap:5px;
      padding:13px 8px; border-radius:11px;
      border:1.5px solid #202022; background:#181819;
      cursor:pointer; transition:all 0.2s;
    }
    .format-card label:hover { border-color:#333; background:#1f1f21; }
    .format-card input:checked + label {
      border-color:#cc0000;
      background:linear-gradient(135deg,rgba(255,0,0,0.1),rgba(180,0,0,0.04));
      box-shadow:0 0 0 1px rgba(255,0,0,0.2);
    }
    .fmt-badge { font-size:15px; font-weight:800; color:#555; letter-spacing:0.04em; transition:color 0.2s; }
    .format-card input:checked + label .fmt-badge { color:#ff4040; }
    .fmt-name { font-size:10px; font-weight:500; color:#555; }
    .format-card input:checked + label .fmt-name { color:#bbb; }
    .fmt-tag {
      font-size:9px; font-weight:600; padding:2px 6px; border-radius:4px; letter-spacing:0.04em;
    }
    .tag-loss  { background:rgba(48,209,88,0.1); color:#30d158; border:1px solid rgba(48,209,88,0.2); }
    .tag-comp  { background:rgba(255,165,0,0.1); color:#ff9f0a; border:1px solid rgba(255,165,0,0.2); }

    /* ── Quality Slider ── */
    .quality-wrap { overflow:hidden; max-height:0; opacity:0; transition:max-height 0.3s, opacity 0.3s; }
    .quality-wrap.show { max-height:60px; opacity:1; }
    .slider-row { display:flex; align-items:center; gap:10px; }
    input[type="range"] {
      flex:1; height:3px; -webkit-appearance:none;
      border-radius:4px; outline:none; cursor:pointer;
      background: linear-gradient(to right, #ff0000 0%, #ff0000 var(--pct,95%), #282828 var(--pct,95%));
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance:none; width:15px; height:15px; border-radius:50%;
      background:#ff2020; border:2px solid #ff4444;
      box-shadow:0 0 5px rgba(255,0,0,0.4); cursor:pointer;
      transition:transform 0.1s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform:scale(1.2); }
    .q-val { font-size:12px; font-weight:700; color:#ff4040; min-width:28px; text-align:right; }

    /* ── Settings fields ── */
    .field { display:flex; flex-direction:column; gap:6px; }
    .field-row { display:flex; align-items:center; gap:8px; }

    .inp {
      flex:1; background:#181819; border:1.5px solid #202022; border-radius:8px;
      padding:8px 10px; font-size:12px; font-family:inherit;
      color:#e0e0e0; outline:none; transition:border-color 0.2s;
    }
    .inp:focus { border-color:#cc0000; }
    .inp::placeholder { color:#444; }

    .folder-hint {
      font-size:10px; color:#444; letter-spacing:0.01em; padding-left:1px;
    }
    .folder-hint span { color:#666; font-weight:500; }

    /* ── Shortcut Recorder ── */
    .shortcut-box {
      display:flex; align-items:center; justify-content:space-between;
      background:#181819; border:1.5px solid #202022; border-radius:8px;
      padding:8px 10px;
    }
    .shortcut-box.recording { border-color:#ff8800; background:rgba(255,136,0,0.05); }
    .shortcut-label-text { font-size:12px; color:#888; }
    .shortcut-box.recording .shortcut-label-text { color:#ff9f0a; }
    .kbd-badge {
      display:inline-flex; align-items:center; gap:4px;
      font-size:12px; color:#ccc; font-weight:600;
    }
    .kbd-badge span {
      background:#242426; border:1px solid #333; border-radius:5px;
      padding:2px 8px; font-family:monospace; font-size:11px;
      box-shadow:0 1px 0 #111;
    }
    .rec-btn {
      font-size:10px; font-weight:600; color:#ff4040; cursor:pointer;
      padding:3px 8px; border-radius:5px; border:1px solid rgba(255,0,0,0.2);
      background:rgba(255,0,0,0.06); transition:all 0.15s; white-space:nowrap;
      font-family:inherit;
    }
    .rec-btn:hover { background:rgba(255,0,0,0.12); border-color:rgba(255,0,0,0.35); }
    .shortcut-box.recording .rec-btn { color:#ff9f0a; border-color:rgba(255,136,0,0.3); background:rgba(255,136,0,0.08); }

    /* ── Divider ── */
    .divider { height:1px; background:linear-gradient(to right, transparent, #1e1e20, transparent); }

    /* ── Status ── */
    .status {
      display:flex; align-items:center; gap:8px;
      padding:9px 11px; border-radius:9px;
      background:#151517; border:1px solid #1e1e20;
      font-size:11px; color:#555; transition:all 0.3s;
    }
    .status-dot { width:6px; height:6px; border-radius:50%; background:#333; flex-shrink:0; transition:all 0.3s; }
    .status.ready { border-color:rgba(48,209,88,0.18); }
    .status.ready .status-dot { background:#30d158; box-shadow:0 0 5px rgba(48,209,88,0.5); }
    .status.ready .status-msg { color:#888; }

    /* ── Save button ── */
    .footer { padding:0 18px 16px; }
    .save-btn {
      width:100%; padding:10px; border:none; border-radius:9px;
      background:linear-gradient(135deg,#d40000,#ff0000);
      color:white; font-family:inherit; font-size:13px; font-weight:600;
      cursor:pointer; letter-spacing:0.01em; position:relative; overflow:hidden;
      transition:all 0.2s;
    }
    .save-btn::before { content:''; position:absolute; inset:0; background:rgba(255,255,255,0); transition:background 0.2s; }
    .save-btn:hover::before { background:rgba(255,255,255,0.07); }
    .save-btn:active { transform:scale(0.98); }
    .save-btn.ok { background:linear-gradient(135deg,#1a7a3a,#30d158); }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24"><path d="M4 4h5l2 3h9a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1zm8 3.5a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9zM12 9a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
  </div>
  <div class="header-text">
    <h1>Frame Catcher</h1>
    <p>YouTube Metadata Stamper</p>
  </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab active" data-tab="format" id="tab-format">Format</div>
  <div class="tab"        data-tab="settings" id="tab-settings">⚙ Settings</div>
</div>

<!-- Panel: Format -->
<div class="panel active" id="panel-format">

  <div>
    <div class="s-label">Output Format</div>
    <div class="format-grid">
      <div class="format-card">
        <input type="radio" name="format" id="fmt-tif" value="tif">
        <label for="fmt-tif">
          <div class="fmt-badge">TIF</div>
          <div class="fmt-name">Lossless</div>
          <span class="fmt-tag tag-loss">LOSSLESS</span>
        </label>
      </div>
      <div class="format-card">
        <input type="radio" name="format" id="fmt-jpg" value="jpg">
        <label for="fmt-jpg">
          <div class="fmt-badge">JPG</div>
          <div class="fmt-name">Compressed</div>
          <span class="fmt-tag tag-comp">LOSSY</span>
        </label>
      </div>
    </div>
  </div>

  <div class="quality-wrap" id="quality-wrap">
    <div class="s-label">JPG Quality</div>
    <div class="slider-row">
      <input type="range" id="jpg-quality" min="60" max="100" value="95" step="1">
      <span class="q-val" id="q-display">95</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="status" id="status">
    <div class="status-dot"></div>
    <span class="status-msg" id="status-msg">Waiting for YouTube tab…</span>
  </div>

</div>

<!-- Panel: Settings -->
<div class="panel" id="panel-settings">

  <!-- Save Folder -->
  <div class="field">
    <div class="s-label">Save Folder</div>
    <div class="field-row">
      <input class="inp" type="text" id="save-folder"
             placeholder="YouTube Frames" spellcheck="false">
    </div>
    <div class="folder-hint">
      Downloads / <span id="folder-preview">YouTube Frames</span> / ...
    </div>
  </div>

  <div class="divider"></div>

  <!-- Keyboard Shortcut -->
  <div class="field">
    <div class="s-label">Keyboard Shortcut</div>
    <div class="shortcut-box" id="shortcut-box">
      <span class="shortcut-label-text" id="shortcut-label">Active shortcut</span>
      <span class="kbd-badge" id="kbd-display"><span id="kbd-key">P</span></span>
      <button class="rec-btn" id="rec-btn">Change</button>
    </div>
  </div>

  <div class="divider"></div>

  <div class="status" id="status2">
    <div class="status-dot"></div>
    <span class="status-msg" id="status-msg2">Waiting for YouTube tab…</span>
  </div>

</div>

<!-- Footer -->
<div class="footer" style="margin-top:4px;">
  <button class="save-btn" id="save-btn">Save &amp; Apply</button>
</div>

<script src="popup.js"></script>
</body>
</html>
