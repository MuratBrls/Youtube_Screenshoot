<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Frame Catcher</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif;
      width: 280px;
      background: #ffffff;
      color: #1c1c1e;
      overflow: hidden;
    }

    /* ── Header ── */
    .header {
      background: linear-gradient(135deg, #c80000 0%, #ff0000 60%, #ff3232 100%);
      padding: 14px 16px 12px;
      display: flex; align-items: center; gap: 10px;
      position: relative; overflow: hidden;
    }
    .header::before {
      content:''; position:absolute; inset:0;
      background: radial-gradient(ellipse at 80% 20%, rgba(255,255,255,0.12) 0%, transparent 60%);
    }
    .header-icon {
      width:32px; height:32px; flex-shrink:0;
      background:rgba(255,255,255,0.18);
      border:1px solid rgba(255,255,255,0.25);
      border-radius:8px; display:flex; align-items:center; justify-content:center;
      backdrop-filter:blur(8px);
    }
    .header-icon svg { width:16px; height:16px; fill:white; }
    .header-text h1 { font-size:13px; font-weight:700; color:white; letter-spacing:0.01em; }
    .header-text p  { font-size:10px; color:rgba(255,255,255,0.65); margin-top:1px; }

    /* ── Tab Bar ── */
    .tab-bar {
      display:flex; background:#f2f2f7;
      border-bottom:1px solid #e5e5ea;
    }
    .tab {
      flex:1; padding:9px 0; text-align:center;
      font-size:11.5px; font-weight:500; color:#8e8e93;
      cursor:pointer; border-bottom:2px solid transparent;
      transition:color 0.2s, border-color 0.2s;
      letter-spacing:0.02em;
    }
    .tab:hover { color:#3a3a3c; }
    .tab.active { color:#ff3b30; border-bottom-color:#ff3b30; background:#fff; }

    /* ── Tab Content ── */
    .panel { display:none; padding:14px 15px; flex-direction:column; gap:13px; }
    .panel.active { display:flex; }

    /* ── Section label ── */
    .s-label {
      font-size:10px; font-weight:600; letter-spacing:0.07em;
      text-transform:uppercase; color:#8e8e93; margin-bottom:7px;
    }

    /* ── Format Cards ── */
    .format-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .format-card { position:relative; cursor:pointer; }
    .format-card input[type="radio"] { position:absolute; opacity:0; pointer-events:none; }
    .format-card label {
      display:flex; flex-direction:column; align-items:center; gap:4px;
      padding:11px 6px; border-radius:10px;
      border:1.5px solid #e5e5ea; background:#fff;
      cursor:pointer; transition:all 0.15s;
    }
    .format-card label:hover { border-color:#d1d1d6; background:#f8f8f8; }
    .format-card input:checked + label {
      border-color:#007aff;
      background:#f0f6ff;
    }
    .fmt-badge { font-size:14px; font-weight:800; color:#8e8e93; letter-spacing:0.03em; transition:color 0.15s; }
    .format-card input:checked + label .fmt-badge { color:#007aff; }
    .fmt-name { font-size:10px; font-weight:500; color:#c7c7cc; }
    .format-card input:checked + label .fmt-name { color:#3a3a3c; }
    .fmt-tag {
      font-size:9px; font-weight:600; padding:2px 6px; border-radius:4px; letter-spacing:0.04em;
    }
    .tag-loss  { background:rgba(52,199,89,0.1); color:#34c759; border:1px solid rgba(52,199,89,0.2); }
    .tag-comp  { background:rgba(255,149,0,0.1); color:#ff9500; border:1px solid rgba(255,149,0,0.2); }

    /* ── Quality Slider ── */
    .quality-wrap { overflow:hidden; max-height:0; opacity:0; transition:max-height 0.3s, opacity 0.3s; }
    .quality-wrap.show { max-height:60px; opacity:1; }
    .slider-row { display:flex; align-items:center; gap:10px; }
    input[type="range"] {
      flex:1; height:3px; -webkit-appearance:none;
      border-radius:4px; outline:none; cursor:pointer;
      background: linear-gradient(to right, #007aff 0%, #007aff var(--pct,95%), #e5e5ea var(--pct,95%));
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance:none; width:15px; height:15px; border-radius:50%;
      background:#007aff; border:2px solid #fff;
      box-shadow:0 1px 4px rgba(0,122,255,0.35); cursor:pointer;
      transition:transform 0.1s;
    }
    input[type="range"]::-webkit-slider-thumb:hover { transform:scale(1.2); }
    .q-val { font-size:12px; font-weight:700; color:#007aff; min-width:28px; text-align:right; }

    /* ── Folder Button ── */
    .folder-btn {
      display:flex; align-items:center; gap:8px;
      padding:9px 11px; background:#f2f2f7; border-radius:10px;
      border:1.5px solid #f2f2f7; cursor:pointer;
      transition:all 0.15s; user-select:none;
    }
    .folder-btn:hover { background:#e9e9ef; border-color:#d1d1d6; }
    .folder-btn svg { flex-shrink:0; }
    .folder-btn-name {
      flex:1; font-size:11.5px; color:#3a3a3c;
      overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:500;
    }
    .folder-chevron { color:#c7c7cc; }
    .folder-hint { font-size:10px; color:#c7c7cc; margin-top:4px; padding-left:2px; }

    /* ── Shortcut ── */
    .shortcut-row { display:flex; align-items:center; gap:8px; }
    .kbd-box {
      flex:1; text-align:center; padding:8px; border-radius:9px;
      background:#f2f2f7; border:1.5px solid #e5e5ea;
      font-family:monospace; font-size:15px; font-weight:700;
      color:#1c1c1e; letter-spacing:0.06em;
      transition:border-color 0.2s, color 0.2s;
    }
    .kbd-box.recording { border-color:#007aff; color:#007aff; }
    .rec-btn {
      padding:8px 12px; border:1.5px solid #e5e5ea; border-radius:9px;
      background:#fff; color:#1c1c1e; font-family:inherit; font-size:11.5px;
      font-weight:500; cursor:pointer; white-space:nowrap; outline:none;
      transition:all 0.15s;
    }
    .rec-btn:hover { background:#f2f2f7; }
    .shortcut-hint { font-size:10px; color:#c7c7cc; margin-top:5px; padding-left:2px; transition:color 0.2s; }

    /* ── Divider ── */
    .divider { height:1px; background:#f2f2f7; }

    /* ── Status ── */
    .status {
      display:flex; align-items:center; gap:8px;
      padding:9px 11px; border-radius:10px;
      background:#f2f2f7; border:1.5px solid #f2f2f7;
      font-size:11px; color:#8e8e93; transition:all 0.3s;
    }
    .status-dot { width:6px; height:6px; border-radius:50%; background:#c7c7cc; flex-shrink:0; transition:all 0.3s; }
    .status.ready { border-color:rgba(52,199,89,0.25); background:#f0fdf4; }
    .status.ready .status-dot { background:#34c759; box-shadow:0 0 5px rgba(52,199,89,0.5); }
    .status.ready .status-msg { color:#3a3a3c; }

    /* ── Save button ── */
    .footer { padding:0 15px 14px; }
    .save-btn {
      width:100%; padding:10px; border:none; border-radius:10px;
      background:linear-gradient(135deg,#d40000,#ff0000);
      color:white; font-family:inherit; font-size:13px; font-weight:600;
      cursor:pointer; letter-spacing:0.01em; position:relative; overflow:hidden;
      transition:all 0.2s;
    }
    .save-btn::before { content:''; position:absolute; inset:0; background:rgba(255,255,255,0); transition:background 0.2s; }
    .save-btn:hover::before { background:rgba(255,255,255,0.1); }
    .save-btn:active { transform:scale(0.98); }
    .save-btn.ok { background:linear-gradient(135deg,#1a7a3a,#34c759); }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="header-icon">
    <svg viewBox="0 0 24 24"><path d="M4 4h5l2 3h9a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1zm8 3.5a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9zM12 9a3 3 0 1 1 0 6 3 3 0 0 1 0-6z"/></svg>
  </div>
  <div class="header-text">
    <h1>Frame Catcher</h1>
    <p>YouTube Metadata Stamper</p>
  </div>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab active" data-tab="format" id="tab-format">Format</div>
  <div class="tab"        data-tab="settings" id="tab-settings">⚙ Settings</div>
</div>

<!-- Panel: Format -->
<div class="panel active" id="panel-format">

  <div>
    <div class="s-label">Output Format</div>
    <div class="format-grid">
      <div class="format-card">
        <input type="radio" name="format" id="fmt-tif" value="tif">
        <label for="fmt-tif">
          <div class="fmt-badge">TIF</div>
        </label>
      </div>
      <div class="format-card">
        <input type="radio" name="format" id="fmt-jpg" value="jpg">
        <label for="fmt-jpg">
          <div class="fmt-badge">JPG</div>
        </label>
      </div>
    </div>
  </div>

  <div class="quality-wrap" id="quality-wrap">
    <div class="s-label">JPG Quality</div>
    <div class="slider-row">
      <input type="range" id="jpg-quality" min="60" max="100" value="95" step="1">
      <span class="q-val" id="q-display">95</span>
    </div>
  </div>

  <div class="divider"></div>

  <div class="status" id="status">
    <div class="status-dot"></div>
    <span class="status-msg" id="status-msg">Waiting for YouTube tab…</span>
  </div>

</div>

<!-- Panel: Settings -->
<div class="panel" id="panel-settings">

  <!-- Save Folder -->
  <div>
    <div class="s-label">Save Folder</div>
    <div class="folder-btn" id="folder-btn">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
           stroke="#3a3a3c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
      </svg>
      <span class="folder-btn-name" id="folder-name">Not Selected</span>
      <svg class="folder-chevron" width="10" height="10" viewBox="0 0 24 24" fill="none"
           stroke="#c7c7cc" stroke-width="2.5" stroke-linecap="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </div>
    <div class="folder-hint" id="folder-hint">Click to choose folder — once is enough</div>
  </div>

  <div class="divider"></div>

  <!-- Keyboard Shortcut -->
  <div>
    <div class="s-label">Keyboard Shortcut</div>
    <div class="shortcut-row">
      <div class="kbd-box" id="kbd-box">P</div>
      <button class="rec-btn" id="rec-btn">Change</button>
    </div>
    <div class="shortcut-hint" id="shortcut-hint">Press P → capture</div>
  </div>

  <div class="divider"></div>

  <div class="status" id="status2">
    <div class="status-dot"></div>
    <span class="status-msg" id="status-msg2">Waiting for YouTube tab…</span>
  </div>

</div>

<!-- Footer -->
<div class="footer" style="margin-top:4px;">
  <button class="save-btn" id="save-btn">Save &amp; Apply</button>
</div>

<script src="popup.js"></script>
</body>
</html>
